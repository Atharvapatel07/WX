<!DOCTYPE html>
<html>

<head>

    <title>User Registration</title>

    <style>

        body{
            font-family:Arial;
            padding:20px;
        }

        input{
            display:block;
            width:250px;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
        }

    </style>

</head>

<body>

<h2>User Registration Form</h2>

<form id="regForm">

    <input type="text"
           id="name"
           placeholder="Enter Name"
           required>

    <input type="email"
           id="email"
           placeholder="Enter Email"
           required>

    <input type="password"
           id="password"
           placeholder="Enter Password"
           required>

    <button type="submit">
        Register
    </button>

</form>

<script>

document.getElementById("regForm")
.addEventListener("submit", function(e){

    // Prevent page refresh
    e.preventDefault();

    // Get input values
    let name =
    document.getElementById("name").value;

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    // Create object
    let user = {

        name:name,
        email:email,
        password:password

    };

    // Get previous users
    let users =
    JSON.parse(localStorage.getItem("users")) || [];

    // Add new user
    users.push(user);

    // Store updated array
    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

    // AJAX POST METHOD

    let xhr = new XMLHttpRequest();

    xhr.open(
        "POST",
        "https://jsonplaceholder.typicode.com/posts",
        true
    );

    xhr.setRequestHeader(
        "Content-Type",
        "application/json"
    );

    xhr.onload = function(){

        if(xhr.status == 201){

            alert("Registration Successful");

            // Redirect to next page
            window.location.href =
            "display.html";

        }

    };

    // Send data
    xhr.send(JSON.stringify(user));

});

</script>

</body>
</html>






#Display



<!DOCTYPE html>
<html>

<head>

<title>User Data</title>

<style>

table{
    border-collapse:collapse;
    width:70%;
}

th,td{
    border:1px solid black;
    padding:10px;
    text-align:center;
}

</style>

</head>

<body>

<h2>Registered Users</h2>

<table>

<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Password</th>
</tr>

<tbody id="tableData">

</tbody>

</table>

<script>

let users =
JSON.parse(localStorage.getItem("users")) || [];

let table =
document.getElementById("tableData");

users.forEach(function(user){

    let row = `

    <tr>

        <td>${user.name}</td>

        <td>${user.email}</td>

        <td>${user.password}</td>

    </tr>

    `;

    table.innerHTML += row;

});

</script>

</body>
</html>
